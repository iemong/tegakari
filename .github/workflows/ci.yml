name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck / Test / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Unit tests (coverage, 90% threshold)
        run: pnpm test:coverage

      - name: Build extension
        run: pnpm build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium + system deps
        run: pnpm exec playwright install --with-deps chromium

      # globalSetup (tests/e2e/global-setup.ts) builds the extension into
      # build/chrome-mv3-prod before specs run. MV3 service workers do not run
      # in classic headless, so the suite is headed and needs a virtual display.
      # E2E_REBUILD=1 is required: build/chrome-mv3-prod is checked into the
      # repo, so without it globalSetup reuses that stale build and the suite
      # silently tests the wrong code instead of this commit.
      - name: Run E2E tests
        run: xvfb-run -a pnpm e2e
        env:
          E2E_REBUILD: "1"

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
