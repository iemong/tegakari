<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>iframe child</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 20px; }
      #child-btn { margin-top: 40px; padding: 8px 16px; }
    </style>
  </head>
  <body>
    <h2 id="child-heading">Child document</h2>
    <p>Rendered inside a same-origin iframe (mimics a GAS web app).</p>
    <div id="child-wrap">
      <button id="child-btn" type="button">Child Button</button>
    </div>
  </body>
</html>
