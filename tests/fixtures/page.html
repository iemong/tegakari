<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>tegakari e2e fixture</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 24px; line-height: 1.6; }
      header { padding: 12px 0; border-bottom: 1px solid #ddd; }
      article { padding: 16px 0; border-bottom: 1px dashed #ccc; }
      button { padding: 6px 12px; }
      .card { border: 1px solid #999; padding: 12px; border-radius: 6px; margin: 8px 0; }
    </style>
  </head>
  <body>
    <header>
      <h1 id="page-title">tegakari fixture page</h1>
      <p>This page exists to give the extension some DOM to inspect.</p>
    </header>

    <main>
      <article id="section-1">
        <h2>Section 1</h2>
        <p>First paragraph with <a href="#anchor">an anchor</a> inside.</p>
        <div class="card">
          <h3>Card A</h3>
          <button id="btn-a" type="button">Button A</button>
        </div>
      </article>

      <article id="section-2">
        <h2>Section 2</h2>
        <ul>
          <li>Item 1</li>
          <li>Item 2</li>
          <li>Item 3</li>
        </ul>
        <form id="demo-form">
          <label>
            Name
            <input type="text" name="name" />
          </label>
          <button type="submit">Submit</button>
        </form>
      </article>
    </main>
  </body>
</html>
